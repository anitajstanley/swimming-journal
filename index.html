<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Water Collective | My Journal</title>
    <style>
        :root {
            --primary: #0077b6; --secondary: #00b4d8; --dark: #03045e;
            --light: #caf0f8; --accent: #ff4d4d; --white: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #cbebff 100%);
            margin: 0; padding: 20px; color: var(--dark); min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        header {
            text-align: center; padding: 30px 0; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.3); margin-bottom: 25px;
        }
        .input-card { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; align-items: end; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .span-full { grid-column: 1 / -1; }
        label { font-weight: 600; font-size: 0.8rem; color: var(--primary); }
        input, select, textarea { padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; font-size: 1rem; outline: none; }
        .file-label { background: #f8fafc; border: 2px dashed #cbd5e0; padding: 10px; border-radius: 10px; cursor: pointer; text-align: center; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; margin-top: 10px; }
        .btn-add:hover { background: var(--dark); transform: translateY(-2px); }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--white); padding: 15px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--secondary); }
        .stat-val { display: block; font-size: 1.6rem; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.8rem; color: var(--primary); text-transform: uppercase; }
        td { padding: 15px; border-top: 1px solid #f1f5f9; vertical-align: top; }
        .temp-pill { background: var(--light); padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .loc-tag { display: block; font-size: 0.75rem; color: #666; margin-top: 4px; font-weight: 600; }
        .swim-img { max-width: 60px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .swim-img:hover { transform: scale(1.1); }
        .btn-del { color: #ccc; cursor: pointer; border: none; background: none; font-size: 1.2rem; }
        .btn-del:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header><h1>🏊‍♂️ My Collective Journal</h1></header>

    <div class="input-card">
        <div class="form-grid">
            <div class="field"><label>Date</label><input type="date" id="inDate"></div>
            <div class="field">
                <label>Location</label>
                <select id="inLocation">
                    <option value="Watersedge">Watersedge</option>
                    <option value="Escape to the Lake">Escape to the Lake</option>
                    <option value="The Lenches">The Lenches</option>
                    <option value="Wild Wood">Wild Wood</option>
                    <option value="Broadfields">Broadfields</option>
                </select>
            </div>
            <div class="field"><label>Temp °C</label><input type="number" id="inTemp" step="0.1"></div>
            <div class="field"><label>Time (mm.ss)</label><input type="number" id="inTime" step="0.01"></div>
            <div class="field"><label>Dist (m)</label><input type="number" id="inDist"></div>
            <div class="field"><label>Photo</label><label for="inPhoto" class="file-label">📸 Add Photo</label><input type="file" id="inPhoto" hidden accept="image/*"></div>
            <div class="field span-full"><label>Swim Notes / Memory</label><textarea id="inNotes"></textarea></div>
            <button class="btn-add span-full" onclick="saveEntry()">✅ Log This Swim</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-box"><span class="stat-val" id="stCount">0</span><span class="stat-label">Swims</span></div>
        <div class="stat-box"><span class="stat-val" id="stDist">0</span><span class="stat-label">Total KM</span></div>
        <div class="stat-box"><span class="stat-val" id="stTemp">0</span><span class="stat-label">Avg Temp</span></div>
        <div class="stat-box" style="border-color: var(--accent);"><span class="stat-val" id="stCold">0</span><span class="stat-label">Coldest Dip</span></div>
    </div>

    <table>
        <thead><tr><th>Photo</th><th>Date / Location</th><th>Temp</th><th>Stats</th><th>Notes</th><th></th></tr></thead>
        <tbody id="journalBody"></tbody>
    </table>
</div>

    let swims = JSON.parse(localStorage.getItem('mySwims')) || initialData;

    function saveEntry() {
        const file = document.getElementById('inPhoto').files[0];
        const process = (imgBase64) => {
            const entry = {
                date: document.getElementById('inDate').value,
                temp: parseFloat(document.getElementById('inTemp').value),
                time: parseFloat(document.getElementById('inTime').value) || 0,
                dist: parseInt(document.getElementById('inDist').value) || 0,
                location: document.getElementById('inLocation').value,
                notes: document.getElementById('inNotes').value,
                photo: imgBase64 || null
            };
            if(!entry.date || isNaN(entry.temp)) return alert("Date and Temp are required!");
            swims.push(entry);
            localStorage.setItem('mySwims', JSON.stringify(swims));
            renderTable();
            document.querySelectorAll('input, select, textarea').forEach(i => i.value = '');
        };
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => process(reader.result);
            reader.readAsDataURL(file);
        } else { process(null); }
    }

    function renderTable() {
        const body = document.getElementById('journalBody');
        body.innerHTML = '';
        let totalD = 0; let totalT = 0; let cold = 100;
        swims.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach((s, idx) => {
            totalD += s.dist; totalT += s.temp; if(s.temp < cold) cold = s.temp;
            body.innerHTML += `<tr>
                <td>${s.photo ? `<img src="${s.photo}" class="swim-img" onclick="window.open(this.src)">` : '➖'}</td>
                <td><b>${s.date}</b><span class="loc-tag">${s.location}</span></td>
                <td><span class="temp-pill">${s.temp.toFixed(1)}°C</span></td>
                <td>${s.dist}m / ${s.time}m</td>
                <td><small>${s.notes}</small></td>
                <td><button class="btn-del" onclick="deleteEntry(${idx})">×</button></td>
            </tr>`;
        });
        document.getElementById('stCount').innerText = swims.length;
        document.getElementById('stDist').innerText = (totalD / 1000).toFixed(1) + "km";
        document.getElementById('stTemp').innerText = (totalT / swims.length).toFixed(1) + "°C";
        document.getElementById('stCold').innerText = (cold === 100 ? 0 : cold).toFixed(1) + "°C";
    }

    function deleteEntry(i) { if(confirm("Delete this?")) { swims.splice(i,1); localStorage.setItem('mySwims', JSON.stringify(swims)); renderTable(); } }
    document.getElementById('inDate').value = new Date().toISOString().split('T')[0];
    renderTable();
</script>
</body>
</html>
