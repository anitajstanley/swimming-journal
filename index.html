<div class="input-card">
    <div class="form-grid">
        <div class="field">
            <label>Date of Swim</label>
            <input type="date" id="inDate">
        </div>

        <div class="field">
            <label>Location</label>
            <select id="inLocation">
                <option value="" selected>Choose Location...</option>
                <option value="Watersedge">Watersedge</option>
                <option value="Escape to the Lake">Escape to the Lake</option>
                <option value="The Lenches">The Lenches</option>
                <option value="Wild Wood">Wild Wood</option>
                <option value="Broadfields">Broadfields</option>
                <option value="Other">Other (Add in notes)</option>
            </select>
        </div>

        <div class="field">
            <label>Temp (°C)</label>
            <input type="number" id="inTemp" step="0.1" placeholder="e.g. 12.5">
        </div>

        <div class="field">
            <label>Time (mm.ss)</label>
            <input type="number" id="inTime" step="0.01" placeholder="e.g. 25.30">
        </div>

        <div class="field">
            <label>Distance (m)</label>
            <input type="number" id="inDist" placeholder="e.g. 800">
        </div>

        <div class="field">
            <label>Swim Photo</label>
            <label for="inPhoto" class="file-input-label">📷 Upload Image</label>
            <input type="file" id="inPhoto" accept="image/*">
            <span id="fileNameDisplay" style="font-size: 10px; color: #666; margin-top: 5px;"></span>
        </div>

        <div class="field span-2">
            <label>Journal Notes (How was the water? Who was there?)</label>
            <textarea id="inNotes" placeholder="Write a short memory of the swim here..."></textarea>
        </div>

        <button class="btn-add" onclick="saveEntry()">✅ Add to My Collective</button>
    </div>
</div>

<script>
    // Set default date to 'Today' on load
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('inDate').value = today;
    };

    // UI Feedback for file upload
    document.getElementById('inPhoto').onchange = function() {
        document.getElementById('fileNameDisplay').innerText = this.files[0].name + " selected";
    };

    // ... (Keep the rest of your saveEntry() and renderTable() logic from the previous version) ...
</script>
